# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/food_waste_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Kousik@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=mySecretKeyForJWTAuthenticationWithMinimum256BitsLengthForHMACSHA256Algorithm
jwt.expiration=86400000

# Logging
logging.level.com.fwms=DEBUG
logging.level.org.springframework.security=DEBUG

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html